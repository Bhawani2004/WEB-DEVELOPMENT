<!DOCTYPE html>

        .container{
            border: 2px solid black;
            height: 1000px;
            margin: 2px;
            padding: 2px;
            display: flex;
        }
        .box{
            border: 2px solid black;
            height: 200px;
            width: 200px;
            margin: 2px;
            padding: 2px;
        }
        #box1{
            background-color: blue;
           
        }
        #box2{
            background-color: brown;
            
        }
        #box3{
            background-color: orange;
            
        }
        #box4{
            background-color: pink;
            
        }
        @media (max-width:640px){
            .container{
                flex-direction:column;
            }
        }
        @media (min-width:640px){
            .container{
                flex-direction:row;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box" id="box1">My</div>
        <div class="box" id="box2">Name</div>
        <div class="box" id="box3">Is</div>
        <div class="box" id="box4">Bhawana</div>
    </div>
