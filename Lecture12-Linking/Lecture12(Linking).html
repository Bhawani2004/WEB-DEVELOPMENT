<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Inside the head tag will not visible on interface only inside the body tag content
    will be visible.This meta tag support different Languages.Known as Character and coding in
    which languages.-->
    <meta charset="UTF-8">

    <!-- This meta tag establish uniformity and latest rentering engine will be use and show similar
      everywhere. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- This meta show your output browser(viewport) known as and that content width is same as your
    device width otherwise we can apply mobile width and that default zoom level/initial scale is 
    1.0; We can change accordingly. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- In title that u write,it will open as name in Browser. -->
    <title>Document</title>
    <!-- When we will open the website it will show in description of that Webpage name. -->
    <meta name="description" content="This website aims to create India's best Coder.">
    <!-- If anyone want to search,if this type of similar words will code then show this 
     website page. -->
    <meta name="keywords" content="Codehelp,Operating System">

    <!-- Some icon is showing,when any webpage will open..That's known as Favicon.
    If we want to add any Favicon,then we have to save that image in root directory.Here root
    directory is Web Developent.  -->
    <!-- In href that we insert link that will show as a Favicon. -->
    <link rel="shortcut icon" href="./Smartphone.webp" type="image/x-icon">
    <!-- By this we can link CSS Style -->
    <link rel="stylesheet" href="Style(Lec12).css">
    <!-- By this we can link JavaScript. -->
    <script src="Script(Lec12).js"></script>
    <!-- In head tag that meta tag be used for helping in Search Engine Optimisation(SEO).
    That will help to if we search that web page it will come in first. -->


</head>
<body>
    <h1>Welcome to CodeHelp</h1>
    <button>Submit</button>
</body>
</html>
