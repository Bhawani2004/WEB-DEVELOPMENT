<!DOCTYPE html>
<html lang="en">
    
<head>

</head>
<body>

    <form>
        
        <label for="name1">Name:</label>
        <br>
        <br>

        <br>
        <input type="email" name="email" id="email1">

        <br>
        <!--type="pattern" we have to search and know about it? -->

        <br>
        <br>

            <option value="doctor">Doctor</option>

            <option value="engineer">Engineer</option>
        </select>
        <br>
        <br>
        <label for="checkbox1">Topics of Interest:</label>
        <br>
        <br>

        <br>
        <label for="checkbox1">HTML</label>
        <br>
        <br>
        <input type="checkbox" name="checkbox1" id="checkbox1">
        <br>
        <label for="checkbox1">CSS</label>
        <br>
        <br>
        <input type="checkbox" name="checkbox1" id="checkbox1">
        <br>
        <label for="checkbox1">JavaScript</label>
        <br>
        <br>
        <label for="comments">Comments:</label>
        <br>
        <textarea name="comments" id="comments" cols="30" rows="5"></textarea>
        <input type="submit" name="register" id="register" value="Register">
    
        
    </form>
