<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form >
        <fieldset>
            <legend>HTML form Dummy</legend>
            <label for="datepicker">Choose Date:</label>
        <input type="date" id="datepicker">

        <br>
        <br>

        <label for="selector1">Choose your Dish:</label>
        <select name="dishes" id="selector1">
            <option value="maggi">Maggi</option>
            <option value="kurkure">Kurkure</option>
            <option value="chips">Chips</option> 
        </select>
        <br>
        <br>
        <button>Main hu Button</button>
        <br>
        <br>
        <textarea name="textarea1" id="textarea1" cols="30" rows="10" placeholder="Enter text here..."></textarea>
        
        </fieldset>
        <br>
        <br>
        <!-- How to select multiple options in select drop down -->
        <label for="cars">Choose a car:</label>

        <select name="cars" id="cars" multiple>
            <option value="volvo">Volvo</option>
            <option value="saab">Saab</option>
            <option value="opel">Opel</option>  
            <option value="audi">Audi</option>
        </select>
        <select multiple>
            <option value="apple">Apple</option>
            <option value="banana">Banana</option>
            <option value="orange">Orange</option>
            <option value="grape">Grape</option>
        </select>    
    </form>
</body>
</html>
