<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root{
            --primary-color: brown;
            --custom-width: 330px;

        }
        .container{
            background-color: beige;
            height: 650px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            
            background-color: aquamarine;
            width: var(--custom-width);
            height: 330px;
            border: 1px solid var(--primary-color);
            margin: 5px;
            padding: 5px;
            box-shadow: -10px -60px var(--primary-color);
            /* box-shadow: -70px 25px 5px 80px brown; */
            /* box-shadow: inset 10px 15px brown; */
            /* box-shadow: 10px 15px red,15px 8px green; */
        }
        #head1{
            text-shadow: 12px 3px 1px white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <img src="Button1.png" alt="Button" width="50px">
            <h2 id="head1">Welcome to CodeHELP</h2>
            <P>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Distinctio pariatur ex,
                repellat dicta cum quis!</P>
        </div>
    </div>
</body>
</html>
