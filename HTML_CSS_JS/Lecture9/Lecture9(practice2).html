<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Complex Form</h1>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name1">Name:</label>
        <input type="text" name="name1" id="name1">
        <label for="email1">Email:</label>
        <input type="email" name="email1" id="email1">
        <label for="phone1">Phone:</label>
        <input type="tel" name="phone1" id="phone1">
        <label for="dob1">Date of Birth</label>
        <input type="date" name="dob1" id="dob1">
        
        <!-- Here we are able to see by using of span and paragraph,in same line how Gender can be write. -->
        <span>Gender:</span>
        <p style="display: inline;">Gender</p>
        <input type="radio" name="radio1" id="radio1">

        <label for="radio1">Male</label>
        <input type="radio" name="radio1" id="radio1">
        <label for="radio1">Female</label>
        <label for="country1">Country</label>
        <select name="country1" id="country1">
             <option value="country1">United States</option>
             <option value="country1">India</option>
             <option value="country1">America</option>
             <option value="country1">Australia</option>
        </select>

        
    </fieldset>
    <fieldset>
        <legend>
            <label for="Street">Address Street</label>
            <input type="text" name="Street" id="Street">
            <label for="City">City</label>
            <input type="text" name="City" id="City">
            <label for="State">State</label>
            <input type="text" name="State" id="State">
            <label for="Zip Code">Zip Code</label>
            <input type="text" name="Zip Code" id="Zip Code">

        </legend>
    </fieldset>
    <fieldset>
        <legend>Other Information</legend>
        <label for="comment1">Comments</label>
        <textarea name="comment1" id="comment1" cols="30" rows="20"></textarea>
        <label for="Terms & Conditions">I agree to the terms of service</label>
        <input type="checkbox" name="Terms & Conditions" id="Terms & Conditions">

    </fieldset>
    
    <input type="submit" name="submit1" id="submit1" value="submit">
    
</body>
</html>
