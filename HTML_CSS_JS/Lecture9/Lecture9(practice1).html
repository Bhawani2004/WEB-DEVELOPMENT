<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Job Application</h1>
    <form >
        <label for="name">Name:</label>
        <br>
        <input type="text" name="name" id="name">
        <br>

        <label for="email">Emal:</label>
        <br>
        <input type="email" name="email" id="email">
        <br>

        <label for="phone">Phone Number:</label>
        <br>
        <input type="tel" name="phone" id="phone">
        <br>

        <label for="About">Resume:</label>
        <br>
        <input type="file" name="About" id="About">
        <br>

        <label for="years">Experience(In years):</label>
        <br>
        <input type="number" name="years" id="years" min="0" max="50">
        <br>
        <fieldset>
            <legend>Skills:</legend>
            <label for="1st">HTML</label>
            <br>
            <input type="checkbox" name="1st" id="1st">
            <br>
            <label for="2nd">CSS</label>
            <br>
            <input type="checkbox" name="2nd" id="2nd">
            <br>
            <label for="3rd">JavaScript</label>
            <br>
            <input type="checkbox" name="3rd" id="3rd">
            <br>
        </fieldset>
        
        <label for="school">Highest Education:</label>
        <br>
        <select name="school" id="school">
            <option value="school">High School</option>
            <option value="college">Graduation</option>
            <option value="college">Post Graduation</option>
        </select>
        <br>
        <!-- Here in this we write same name of both radio button,that's why only one option select at once.  -->
        <h1>Availability:</h1>
        <label for="timing1">Full-Time</label>
        <br>
        <input type="radio" name="timing1" id="timing1">
        <br>
        <label for="timing1">Part-Time</label>
        <br>
        <input type="radio" name="timing1" id="timing1">
        <br>
        
        <label for="comment">Additional Comments:</label>
        <br>
        <textarea name="comment" id="comment" cols="30" rows="10"></textarea>
        <br>
        <button>Submit Application</button>



    </form>
</body>
</html>
