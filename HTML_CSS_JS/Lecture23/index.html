<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animations Ka Gyaan</title>
    <style>
        /* @keyframes example{
            from{ background-color: red;}
            to{ background-color: yellow;}
        } */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: beige;
            border: 5px solid black;
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            /* animation-name: rightMovement;
            animation-duration: 5s;
            animation-iteration-count: 2;
            animation-delay: 2s;
            animation-timing-function: linear;
            animation-direction: alternate; */
            animation: 5s linear 2s 2 alternate none running rightMovement;
        }
        @keyframes rightMovement{
            from{
                top: 0;
                left: 0;
            }
            to{
                top: 0;
                left: 1350px;
            }
        }
        #box2{
             width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin: 10px;
            position: relative;
            animation: 5s linear 2s 2 alternate none running leftMovement;
        }
        @keyframes leftMovement{
            from{
                top: 400px;
                left: 1350px;
            }
            to{
                top: 400px;
                left: 0;
            }
        }
        #circle{
            width: 50px;
            height: 50px;
            background-color: blue;
            border: 3px solid yellow;
            border-radius: 50px;
            margin: 10px;
            position: relative;
            top: 30%;
            left: 40%;
            animation: 10s ease-in-out 0s 6 alternate-reverse none running circleMovement;
        }
        @keyframes circleMovement{
            0%{
                top: 1%;
                left: 5%;
            }
            30%{
                top: 5%;
                left: 50%;
            }
            60%{
                top: 60%;
                left: 10%;
            }
            100%{
                top: 70%;
                left: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div id="box2"></div>
        <div id="circle"></div>
    </div>
          
</body>
</html>
